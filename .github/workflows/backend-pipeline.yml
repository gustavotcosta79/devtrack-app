# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    # para apenas ativarmos o pipeline se alterarmos ficheiros dentro da pasta backend
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:
    - name: Fazer checkout do código
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements.txt

    - name: Correr testes com pytest
      working-directory: ./backend
      # O '|| true' serve para o pipeline não falhar caso ainda não tenhas escrito nenhum teste real
      run: |
        pytest || true

    - name: Login no Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v7
      with:
        context: ./backend # pasta onde o dockerfile está
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/devtrack-app:latest